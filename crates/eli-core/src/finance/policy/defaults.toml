[ranking]
title_exact_bonus = 30.0
term_match_weight = 8.0
ticker_event_match_weight = 6.0
category_topic_match_weight = 4.0
volume_log_weight = 3.0
macro_keyword_weight = 8
macro_economics_boost = 45
macro_financials_boost = 25
macro_mentions_penalty = -70
macro_offtopic_penalty = -20
delta_prob_weight = 1.0
delta_yes_price_weight = 1.0
delta_volume_weight = 1.0
novelty_weight = 1.0
confidence_weight = 1.0

[filtering]
macro_profile_min_relevance = -60
enforce_requires_match_terms = true
enforce_min_volume_usd = 0.0
macro_keywords = ["federal reserve","fed","fomc","rate","inflation","cpi","pce","ppi","unemployment","payroll","tariff","gdp","recession","yield","treasury"]
macro_offtopic_keywords = ["mentions","tweet","airdrop","courts","crypto"]
us_hint_keywords = ["us","u.s.","united states","american","nfp","nonfarm payrolls","fomc","federal reserve","cpi","pce","gdpnow"]
policy_action_keywords = ["rate","cut","cuts","hike","hikes","hold","decrease","increase","bps","basis point","decision","meeting"]

[freshness]
live_after_seconds = 30
delayed_after_seconds = 900
stale_after_seconds = 21600

[stdout_compaction]
top_categories = 8
top_markets_by_volume = 3
top_markets_by_informative_volume = 3
top_anomalous_zero_yes_markets = 2
top_near_even_high_volume_markets = 2
top_high_confidence_high_volume_markets = 2
top_probability_moves = 3
top_yes_price_moves = 3
top_volume_moves = 3
max_title_chars = 96
max_category_chars = 32

