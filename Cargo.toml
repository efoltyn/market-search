[package]
name = "eli"
version.workspace = true
edition.workspace = true
license.workspace = true
authors.workspace = true
description.workspace = true

[dependencies]
anyhow.workspace = true
tokio.workspace = true
eli-cli = { path = "crates/eli-cli" }

[workspace]
members = ["crates/*"]
resolver = "2"

[workspace.package]
version = "0.1.0"
edition = "2021"
license = "MIT"
authors = ["Eli Foltyn"]
description = "A terminal CLI coding agent"

[workspace.dependencies]
# Async runtime
tokio = { version = "1.40", features = ["full"] }
async-trait = "0.1"
futures = "0.3"

# CLI & TUI
clap = { version = "4.5", features = ["derive"] }
ratatui = "0.29"
crossterm = "0.28"
rustyline = "14.0"

# HTTP & Streaming
reqwest = { version = "0.12", features = ["json", "stream"] }
reqwest-eventsource = "0.6"

# Serialization
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
toml = "0.8"

# File operations
similar = "2.6"
sha2 = "0.10"
walkdir = "2.5"
directories = "5.0"

# Error handling
thiserror = "2.0"
anyhow = "1.0"

# Logging
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }


# Utils
chrono = { version = "0.4", features = ["serde"] }
uuid = { version = "1.11", features = ["v4"] }
yahoo_finance_api = "2.3"
html-escape = "0.2"

# Internal crates
eli-core = { path = "crates/eli-core" }
eli-adapters = { path = "crates/eli-adapters" }
eli-screen = { path = "crates/eli-screen" }
eli-tui = { path = "crates/eli-tui" }

[profile.release]
lto = true
codegen-units = 1
strip = true
panic = "abort"
